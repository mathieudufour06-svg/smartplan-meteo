<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#161b28"/>
    </linearGradient>
    <linearGradient id="tint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7696ff"/>
      <stop offset="100%" stop-color="#5570e8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c87a"/>
      <stop offset="100%" stop-color="#c9a030"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f4a426"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Sun (top right) -->
  <circle cx="370" cy="148" r="52" fill="url(#sun)" opacity="0.92" filter="url(#glow)"/>
  <!-- Sun rays -->
  <g stroke="#ffd166" stroke-width="7" stroke-linecap="round" opacity="0.7">
    <line x1="370" y1="82" x2="370" y2="70"/>
    <line x1="370" y1="214" x2="370" y2="226"/>
    <line x1="304" y1="148" x2="292" y2="148"/>
    <line x1="436" y1="148" x2="448" y2="148"/>
    <line x1="323" y1="101" x2="315" y2="93"/>
    <line x1="417" y1="195" x2="425" y2="203"/>
    <line x1="417" y1="101" x2="425" y2="93"/>
    <line x1="323" y1="195" x2="315" y2="203"/>
  </g>

  <!-- Cloud body -->
  <g filter="url(#glow)" opacity="0.95">
    <circle cx="200" cy="230" r="70" fill="url(#tint)"/>
    <circle cx="270" cy="215" r="55" fill="url(#tint)"/>
    <circle cx="145" cy="250" r="48" fill="url(#tint)"/>
    <rect x="145" y="240" width="180" height="70" rx="0" fill="url(#tint)"/>
  </g>
  <!-- Cloud highlight -->
  <ellipse cx="210" cy="210" rx="35" ry="18" fill="white" opacity="0.12"/>

  <!-- Checklist lines (below cloud) — represents planning -->
  <g opacity="0.9">
    <!-- Line 1: green check -->
    <rect x="96" y="338" width="320" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
    <circle cx="118" cy="352" r="10" fill="#2dd483"/>
    <polyline points="112,352 116,357 126,346" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="138" y="346" width="130" height="12" rx="6" fill="#ffffff" fill-opacity="0.5"/>

    <!-- Line 2: orange dot -->
    <rect x="96" y="374" width="320" height="28" rx="14" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="118" cy="388" r="10" fill="#f97316" fill-opacity="0.85"/>
    <rect x="138" y="382" width="100" height="12" rx="6" fill="#ffffff" fill-opacity="0.35"/>

    <!-- Line 3: empty -->
    <rect x="96" y="410" width="320" height="28" rx="14" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="118" cy="424" r="10" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2"/>
    <rect x="138" y="418" width="80" height="12" rx="6" fill="#ffffff" fill-opacity="0.2"/>
  </g>

  <!-- Brand label -->
  <text x="256" y="302" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="url(#gold)" text-anchor="middle" letter-spacing="3">SMARTPLAN</text>
</svg>
