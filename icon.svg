<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2d4a"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="hat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#e07b00"/>
    </linearGradient>
    <linearGradient id="hatShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd84d"/>
      <stop offset="60%" stop-color="#ffb800"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ab0d8"/>
      <stop offset="100%" stop-color="#5a80aa"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
    <linearGradient id="rain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7ab8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4a8fd4" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="sunGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Sky area top -->
  <rect x="0" y="0" width="512" height="280" rx="0" fill="url(#sky)" opacity="0.6" clip-path="inset(0 0 0 0 round 112px 112px 0 0)"/>

  <!-- Sun (top left, partially behind cloud) -->
  <circle cx="148" cy="148" r="58" fill="url(#sun)" filter="url(#sunGlow)" opacity="0.95"/>
  <g stroke="#ffe566" stroke-width="8" stroke-linecap="round" opacity="0.6">
    <line x1="148" y1="72"  x2="148" y2="58"/>
    <line x1="148" y1="224" x2="148" y2="238"/>
    <line x1="72"  y1="148" x2="58"  y2="148"/>
    <line x1="224" y1="148" x2="238" y2="148"/>
    <line x1="96"  y1="96"  x2="86"  y2="86"/>
    <line x1="200" y1="200" x2="210" y2="210"/>
    <line x1="200" y1="96"  x2="210" y2="86"/>
    <line x1="96"  y1="200" x2="86"  y2="210"/>
  </g>

  <!-- Storm cloud (center-right, covering part of sun) -->
  <g filter="url(#shadow)">
    <circle cx="310" cy="175" r="62"  fill="url(#cloud)"/>
    <circle cx="368" cy="188" r="50"  fill="url(#cloud)"/>
    <circle cx="252" cy="192" r="46"  fill="url(#cloud)"/>
    <rect   x="252"  y="188" width="166" height="58" rx="0" fill="url(#cloud)"/>
    <!-- Darker bottom of cloud -->
    <rect   x="252"  y="218" width="166" height="28" rx="0" fill="#3a5f80" opacity="0.5"/>
  </g>
  <!-- Cloud shine -->
  <ellipse cx="318" cy="162" rx="38" ry="16" fill="white" opacity="0.15"/>

  <!-- Rain drops from cloud -->
  <g fill="url(#rain1)">
    <rect x="276" y="258" width="6" height="22" rx="3"/>
    <rect x="306" y="268" width="6" height="22" rx="3"/>
    <rect x="336" y="256" width="6" height="22" rx="3"/>
    <rect x="366" y="264" width="6" height="22" rx="3"/>
    <rect x="291" y="282" width="5" height="16" rx="2.5"/>
    <rect x="321" y="290" width="5" height="16" rx="2.5"/>
    <rect x="351" y="280" width="5" height="16" rx="2.5"/>
  </g>

  <!-- Hard hat — the hero element -->
  <g filter="url(#shadow)">
    <!-- Brim (flat base) -->
    <rect x="104" y="342" width="304" height="24" rx="10" fill="url(#hat)"/>
    <!-- Dome -->
    <path d="M 148 342 Q 148 248 256 240 Q 364 248 364 342 Z" fill="url(#hatShine)"/>
    <!-- Brim shadow under dome -->
    <rect x="104" y="342" width="304" height="10" rx="5" fill="#c06000" opacity="0.4"/>
    <!-- Center ridge stripe -->
    <path d="M 248 242 Q 252 240 256 240 Q 260 240 264 242 L 268 342 L 244 342 Z" fill="white" opacity="0.12"/>
    <!-- Inner band -->
    <rect x="148" y="354" width="216" height="16" rx="8" fill="#c06000" opacity="0.45"/>
    <!-- Vent slots -->
    <rect x="226" y="268" width="12" height="30" rx="4" fill="#c06000" opacity="0.35"/>
    <rect x="274" y="268" width="12" height="30" rx="4" fill="#c06000" opacity="0.35"/>
  </g>

  <!-- SmartPlan label at bottom -->
  <rect x="80" y="396" width="352" height="52" rx="14" fill="#ffffff" fill-opacity="0.05"/>
  <text x="256" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="900" fill="#ffb800" text-anchor="middle" letter-spacing="2.5">SMARTPLAN</text>
</svg>
