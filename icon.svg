<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c3050"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="30%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aabdc"/>
      <stop offset="100%" stop-color="#3d6e9e"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4852a"/>
      <stop offset="100%" stop-color="#a85e10"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c3d1a"/>
      <stop offset="100%" stop-color="#3a2208"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Sky -->
  <rect x="0" y="0" width="512" height="400" rx="0" fill="url(#sky)" clip-path="inset(0 0 112px 0 round 112px 112px 0 0)"/>

  <!-- Sun glow halo -->
  <circle cx="390" cy="122" r="72" fill="#ff9500" opacity="0.15" filter="url(#glow)"/>
  <!-- Sun -->
  <circle cx="390" cy="122" r="46" fill="url(#sun)" filter="url(#glow)"/>
  <!-- Sun rays -->
  <g stroke="#ffe566" stroke-width="7" stroke-linecap="round" opacity="0.55">
    <line x1="390" y1="58"  x2="390" y2="44"/>
    <line x1="390" y1="186" x2="390" y2="200"/>
    <line x1="326" y1="122" x2="312" y2="122"/>
    <line x1="454" y1="122" x2="468" y2="122"/>
    <line x1="345" y1="77"  x2="335" y2="67"/>
    <line x1="435" y1="167" x2="445" y2="177"/>
    <line x1="435" y1="77"  x2="445" y2="67"/>
    <line x1="345" y1="167" x2="335" y2="177"/>
  </g>

  <!-- Storm cloud (moving in from left) -->
  <g filter="url(#shadow)" opacity="0.93">
    <circle cx="172" cy="168" r="66" fill="url(#cloud)"/>
    <circle cx="238" cy="152" r="52" fill="url(#cloud)"/>
    <circle cx="118" cy="182" r="44" fill="url(#cloud)"/>
    <rect   x="118"  y="178" width="172" height="56" rx="0" fill="url(#cloud)"/>
    <rect   x="118"  y="208" width="172" height="26" rx="0" fill="#2a5070" opacity="0.55"/>
  </g>
  <!-- Cloud highlight -->
  <ellipse cx="180" cy="152" rx="42" ry="16" fill="white" opacity="0.13"/>

  <!-- Rain -->
  <g fill="#7ab8ff" opacity="0.75">
    <rect x="136" y="242" width="6" height="24" rx="3"/>
    <rect x="162" y="254" width="6" height="24" rx="3"/>
    <rect x="188" y="244" width="6" height="24" rx="3"/>
    <rect x="214" y="252" width="6" height="24" rx="3"/>
    <rect x="149" y="272" width="5" height="18" rx="2.5"/>
    <rect x="175" y="278" width="5" height="18" rx="2.5"/>
    <rect x="201" y="270" width="5" height="18" rx="2.5"/>
  </g>

  <!-- Ground / foundation -->
  <rect x="60" y="420" width="392" height="36" rx="8" fill="url(#ground)"/>
  <rect x="60" y="416" width="392" height="10" rx="4" fill="#7a5228" opacity="0.6"/>

  <!-- House frame (charpente) — structural lumber look -->
  <g fill="url(#wood)" filter="url(#shadow)">
    <!-- Left wall stud vertical -->
    <rect x="112" y="310" width="18" height="114" rx="4"/>
    <!-- Right wall stud vertical -->
    <rect x="382" y="310" width="18" height="114" rx="4"/>
    <!-- Center stud -->
    <rect x="247" y="330" width="18" height="94" rx="4"/>

    <!-- Bottom plate (sill) -->
    <rect x="108" y="416" width="296" height="14" rx="4"/>

    <!-- Top plate (top of wall) -->
    <rect x="108" y="306" width="296" height="14" rx="4"/>

    <!-- Left rafter -->
    <rect x="256" y="175"
          width="18" height="168" rx="5"
          transform="rotate(-38, 265, 175)"/>
    <!-- Right rafter -->
    <rect x="256" y="175"
          width="18" height="168" rx="5"
          transform="rotate(38, 247, 175)"/>

    <!-- Ridge board (peak) -->
    <rect x="247" y="168" width="18" height="30" rx="5"/>

    <!-- Collar tie (cross brace on rafters) -->
    <rect x="170" y="265" width="172" height="14" rx="4"/>

    <!-- Left diagonal brace -->
    <rect x="112" y="310"
          width="14" height="100" rx="4"
          transform="rotate(-30, 119, 358)"/>
    <!-- Right diagonal brace -->
    <rect x="382" y="310"
          width="14" height="100" rx="4"
          transform="rotate(30, 389, 358)"/>
  </g>

  <!-- Brand -->
  <rect x="72" y="456" width="368" height="38" rx="10" fill="#ffffff" fill-opacity="0.05"/>
  <text x="256" y="483" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="900" fill="#ffb800"
        text-anchor="middle" letter-spacing="2.5">SMARTPLAN</text>
</svg>
