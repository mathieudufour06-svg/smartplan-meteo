<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <meta name="theme-color" content="#0a0f1e">
  <title>SmartPlan Météo · Décision terrain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0f1e;
      --bg1:     #111827;
      --bg2:     #1a2035;
      --glass:   rgba(255,255,255,0.05);
      --border:  rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
      --text0:   #f8fafc;
      --text1:   #cbd5e1;
      --text2:   #8e9bb5;
      --text3:   #4b5563;
      --accent:  #6366f1;
      --accent2: #8b5cf6;
      --ok:      #10b981; --ok-bg:     rgba(16,185,129,0.14); --ok-bd:     rgba(16,185,129,0.35);
      --risk:    #f59e0b; --risk-bg:   rgba(245,158,11,0.14); --risk-bd:   rgba(245,158,11,0.35);
      --danger:  #ef4444; --danger-bg: rgba(239,68,68,0.14);  --danger-bd: rgba(239,68,68,0.40);
      --col: 196px;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text0);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── TOP BAR ─────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      background: rgba(10,15,30,0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .brand-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center; font-size: 1.15rem;
      box-shadow: 0 6px 20px rgba(99,102,241,0.45);
    }
    .brand-text b  { display: block; font-size: 0.97rem; font-weight: 800; letter-spacing: -0.01em; line-height: 1.2; }
    .brand-text em { display: block; font-size: 0.68rem; color: var(--text3); font-style: normal;
                     text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }

    .loc-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 13px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 999px; cursor: pointer;
      color: var(--text1); font-size: 0.83rem; font-weight: 600;
      transition: border-color .2s, background .2s;
      white-space: nowrap; overflow: hidden; max-width: 220px;
    }
    .loc-btn:hover { border-color: var(--border2); background: rgba(255,255,255,0.08); }
    .loc-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--ok); box-shadow: 0 0 8px var(--ok);
      transition: background .4s, box-shadow .4s;
    }
    .loc-dot.loading { background: var(--risk); box-shadow: 0 0 8px var(--risk); animation: blink 1s infinite; }
    .loc-dot.offline { background: var(--text3); box-shadow: none; }
    @keyframes blink { 50% { opacity: .4; } }
    #locName { overflow: hidden; text-overflow: ellipsis; }

    .weather-pill {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
      padding: 6px 13px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 999px; font-size: 0.83rem;
      flex-shrink: 0;
    }
    .weather-pill .wi { font-size: 1.2rem; line-height: 1; }
    .weather-pill .wt { font-weight: 700; }
    .weather-pill .wd { color: var(--text2); }
    @media (max-width: 520px) { .weather-pill .wd { display: none; } }

    /* ── SWAP BANNER ─────────────────────────────── */
    #swapBanner {
      max-height: 0; overflow: hidden;
      border-bottom: 1px solid transparent;
      transition: max-height .35s ease, padding .3s ease, border-color .3s;
    }
    #swapBanner.show {
      max-height: 300px; padding: 10px 18px 12px;
      border-bottom-color: rgba(245,158,11,0.22);
      background: rgba(245,158,11,0.05);
    }
    .swap-hd {
      font-size: 0.74rem; font-weight: 800; color: var(--risk);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .swap-pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .swap-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.28);
      border-radius: 10px; font-size: 0.82rem;
    }
    .swap-pill.sev-danger {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.32);
    }
    .swap-pill .sp-txt { color: var(--text1); flex: 1; min-width: 0; }
    .swap-pill .sp-btn {
      padding: 4px 11px; border-radius: 999px; cursor: pointer;
      font-size: 0.74rem; font-weight: 700; white-space: nowrap;
      background: rgba(245,158,11,0.2); color: var(--risk);
      border: 1px solid rgba(245,158,11,0.4);
      transition: background .2s, transform .15s;
    }
    .swap-pill.sev-danger .sp-btn {
      background: rgba(239,68,68,0.18); color: #f87171;
      border-color: rgba(239,68,68,0.4);
    }
    .swap-pill .sp-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

    /* ── BOARD ───────────────────────────────────── */
    .board-wrap { overflow-x: auto; padding: 18px; }
    .board {
      display: grid;
      grid-template-columns: repeat(7, var(--col));
      gap: 10px;
      min-width: calc(7 * var(--col) + 6 * 10px);
    }

    /* ── DAY COLUMN ──────────────────────────────── */
    .day-col { display: flex; flex-direction: column; gap: 8px; }

    .day-hd {
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      transition: border-color .25s;
    }
    .day-hd.today { border-color: rgba(99,102,241,0.55); }

    .risk-bar { height: 4px; width: 100%; }
    .risk-bar.ok     { background: var(--ok); }
    .risk-bar.risk   { background: var(--risk); }
    .risk-bar.danger { background: var(--danger); }

    .day-hd-body { padding: 11px 13px 10px; background: var(--bg1); }
    .day-lbl {
      font-size: 0.7rem; font-weight: 800; color: var(--text2);
      text-transform: uppercase; letter-spacing: .09em; margin-bottom: 1px;
    }
    .day-num {
      font-size: 1.55rem; font-weight: 800; letter-spacing: -.02em; line-height: 1;
    }
    .today .day-num { color: #a5b4fc; }

    .day-wx-row { display: flex; align-items: center; gap: 7px; margin-top: 7px; }
    .day-wx-icon { font-size: 1.45rem; line-height: 1; flex-shrink: 0; }
    .day-wx-info { display: flex; flex-direction: column; gap: 1px; }
    .day-temps { font-size: 0.85rem; font-weight: 700; }
    .day-temps .hi { color: var(--text0); }
    .day-temps .lo { color: var(--text2); font-size: 0.78rem; }
    .day-wx-lbl { font-size: 0.72rem; color: var(--text2); }

    .day-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .chip {
      padding: 2px 7px; border-radius: 999px; font-size: 0.68rem; font-weight: 700;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text2);
    }
    .chip.warn { background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.3); color: #fbbf24; }
    .chip.bad  { background: rgba(239,68,68,0.10);  border-color: rgba(239,68,68,0.3);  color: #f87171; }

    .risk-badge {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      margin-top: 7px; padding: 5px 8px; border-radius: 8px;
      font-size: 0.70rem; font-weight: 800; text-transform: uppercase; letter-spacing: .07em;
    }
    .risk-badge.ok     { background: var(--ok-bg);     color: var(--ok);     border: 1px solid var(--ok-bd); }
    .risk-badge.risk   { background: var(--risk-bg);   color: var(--risk);   border: 1px solid var(--risk-bd); }
    .risk-badge.danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-bd); }

    /* ── TASK SLOT ───────────────────────────────── */
    .task-slot { display: flex; flex-direction: column; gap: 7px; min-height: 20px; }

    .task-card {
      position: relative; padding: 11px 11px 9px;
      border-radius: 11px; border: 1px solid var(--border);
      background: var(--bg2); cursor: pointer;
      transition: transform .15s, border-color .2s, box-shadow .2s;
    }
    .task-card:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.4); }
    .task-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; bottom: 0; width: 3px;
      border-radius: 11px 0 0 11px;
    }
    .task-card.ok     { border-color: rgba(16,185,129,0.28); }
    .task-card.ok::before     { background: var(--ok); }
    .task-card.risk   { border-color: rgba(245,158,11,0.32); }
    .task-card.risk::before   { background: var(--risk); }
    .task-card.danger { border-color: rgba(239,68,68,0.40); }
    .task-card.danger::before { background: var(--danger); }

    .tc-icon   { font-size: 1.1rem; line-height: 1; margin-bottom: 3px; }
    .tc-name   { font-size: 0.85rem; font-weight: 700; color: var(--text0); padding-right: 58px; }
    .tc-client { font-size: 0.73rem; color: var(--text2); margin-top: 1px; }
    .tc-risk   { font-size: 0.72rem; margin-top: 6px; display: flex; align-items: flex-start; gap: 4px; line-height: 1.3; }
    .tc-risk.ok     { color: #6ee7b7; }
    .tc-risk.risk   { color: #fcd34d; }
    .tc-risk.danger { color: #fca5a5; }

    /* ── CARD ACTION BUTTONS ────────────────────── */
    .tc-actions {
      position: absolute; top: 7px; right: 7px;
      display: flex; gap: 4px; z-index: 1;
    }
    .tc-edit-btn, .tc-del-btn {
      width: 24px; height: 24px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      opacity: 0.35; transition: opacity .15s, background .15s;
    }
    .task-card:hover .tc-edit-btn,
    .task-card:hover .tc-del-btn { opacity: 1; }
    /* always visible on touch devices (no hover state) */
    @media (hover: none) { .tc-edit-btn, .tc-del-btn { opacity: 0.7; } }
    .tc-edit-btn {
      background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.20);
      color: #a5b4fc;
    }
    .tc-edit-btn:hover { background: rgba(99,102,241,0.22); }
    .tc-del-btn {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.20);
      color: #f87171;
    }
    .tc-del-btn:hover { background: rgba(239,68,68,0.25); }

    .add-btn {
      width: 100%; padding: 10px;
      background: transparent; border: 1.5px dashed rgba(255,255,255,0.13);
      border-radius: 10px; color: var(--text3); font-size: 0.81rem;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      min-height: 44px;
    }
    .add-btn:hover {
      border-color: rgba(99,102,241,0.5); color: #a5b4fc;
      background: rgba(99,102,241,0.06);
    }

    /* ── SKELETON ────────────────────────────────── */
    .skel {
      border-radius: 12px;
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.09) 50%,
        rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    /* ── MODAL BASE ──────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      width: 100%; max-width: 440px;
      background: var(--bg1);
      border: 1px solid var(--border2);
      border-radius: 20px; padding: 26px 22px;
      box-shadow: 0 28px 64px rgba(0,0,0,0.65);
      transform: translateY(14px) scale(.98);
      transition: transform .25s cubic-bezier(.2,.7,.3,1);
      max-height: 90vh; overflow-y: auto;
    }
    .overlay.open .modal { transform: none; }
    .modal h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 18px; letter-spacing: -.01em; }

    .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .fg label {
      font-size: 0.73rem; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .fg input, .fg select, .fg textarea {
      padding: 11px 13px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text0); font-size: 0.93rem;
      outline: none; transition: border-color .2s;
      -webkit-appearance: none; font-family: inherit;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); }
    .fg select option { background: #1a2035; }
    .fg textarea { resize: vertical; min-height: 64px; }

    .type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .type-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 9px 5px; border-radius: 10px; cursor: pointer;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      font-size: 0.66rem; color: var(--text2); font-weight: 600;
      text-align: center; transition: border-color .2s, background .2s, color .2s;
      min-height: 60px;
    }
    .type-btn .ti { font-size: 1.35rem; line-height: 1; margin-bottom: 2px; }
    .type-btn:hover, .type-btn.sel {
      border-color: var(--accent); background: rgba(99,102,241,0.12); color: var(--text0);
    }

    .mf { display: flex; gap: 9px; margin-top: 6px; }
    .btn-cancel {
      flex: 1; padding: 12px; border-radius: 11px;
      background: var(--glass); border: 1px solid var(--border);
      color: var(--text1); font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.09); }
    .btn-primary {
      flex: 2; padding: 12px; border-radius: 11px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 0.92rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 22px rgba(99,102,241,0.4);
      transition: filter .2s, transform .15s;
    }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-primary:active { transform: none; }

    /* ── DELETE CONFIRM ──────────────────────────────── */
    .del-confirm {
      display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
      padding: 10px 13px; border-radius: 10px; margin-bottom: 10px;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.28);
      font-size: 0.84rem; color: #fca5a5;
    }
    .del-confirm span { flex: 1; min-width: 0; }
    .btn-del-yes {
      padding: 6px 13px; border-radius: 8px; cursor: pointer;
      background: rgba(239,68,68,0.22); border: 1px solid rgba(239,68,68,0.45);
      color: #f87171; font-size: 0.8rem; font-weight: 700;
      transition: background .15s; white-space: nowrap;
    }
    .btn-del-yes:hover { background: rgba(239,68,68,0.38); }
    .btn-del-no {
      padding: 6px 10px; border-radius: 8px; cursor: pointer;
      background: var(--glass); border: 1px solid var(--border);
      color: var(--text2); font-size: 0.8rem; font-weight: 600;
      transition: background .15s; white-space: nowrap;
    }
    .btn-del-no:hover { background: rgba(255,255,255,0.08); }

    /* ── DELETE BUTTON IN MODAL FOOTER ──────────────── */
    .btn-del {
      padding: 12px 14px; border-radius: 11px; cursor: pointer; flex-shrink: 0;
      background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.22);
      color: #f87171; font-size: 0.86rem; font-weight: 600;
      transition: background .2s, border-color .2s;
      white-space: nowrap;
    }
    .btn-del:hover { background: rgba(239,68,68,0.20); border-color: rgba(239,68,68,0.45); }

    /* ── LOCATION MODAL EXTRAS ───────────────────── */
    .btn-geo {
      width: 100%; padding: 11px; border-radius: 10px; margin-bottom: 10px;
      background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.28);
      color: #34d399; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s;
    }
    .btn-geo:hover { background: rgba(16,185,129,0.18); }
    .loc-input {
      width: 100%; padding: 11px 13px; margin-bottom: 9px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text0); font-size: 0.92rem;
      outline: none; font-family: inherit;
    }
    .loc-input:focus { border-color: var(--accent); }
    .loc-results { display: flex; flex-direction: column; gap: 5px; max-height: 230px; overflow-y: auto; }
    .loc-item {
      padding: 9px 13px; border-radius: 10px; cursor: pointer;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      font-size: 0.88rem; color: var(--text1);
      transition: background .15s, border-color .15s;
    }
    .loc-item:hover { background: rgba(99,102,241,0.10); border-color: rgba(99,102,241,0.35); color: var(--text0); }
    .loc-empty { font-size: 0.85rem; color: var(--text3); padding: 10px 0; }

    /* ── TOAST ───────────────────────────────────── */
    #toast {
      position: fixed; left: 50%; bottom: 26px; z-index: 400;
      transform: translateX(-50%) translateY(14px);
      padding: 10px 18px;
      background: rgba(12,17,30,0.96);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; color: var(--text0);
      font-size: 0.86rem; font-weight: 600;
      box-shadow: 0 12px 32px rgba(0,0,0,.5);
      backdrop-filter: blur(12px);
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 680px) { :root { --col: 158px; } }
    @media (max-width: 520px) { :root { --col: 144px; } .topbar { padding: 9px 12px; } .board-wrap { padding: 12px; } }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="brand">
    <div class="brand-icon">⛅</div>
    <div class="brand-text">
      <b>SmartPlan Météo</b>
      <em>Décision terrain</em>
    </div>
  </div>
  <button class="loc-btn" id="locBtn" onclick="openLocModal()">
    <span class="loc-dot" id="locDot"></span>
    <span id="locName">Chargement…</span>
  </button>
  <div class="weather-pill" id="weatherPill">
    <span class="wi" id="wIcon">☁</span>
    <span class="wt" id="wTemp">—°</span>
    <span class="wd" id="wDesc">…</span>
  </div>
</header>

<!-- SWAP BANNER -->
<div id="swapBanner">
  <div class="swap-hd">⟳ Suggestions de déplacement</div>
  <div class="swap-pills" id="swapList"></div>
</div>

<!-- BOARD -->
<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- ADD / EDIT TASK MODAL -->
<div class="overlay" id="taskOverlay" onclick="overlayClick(event,'taskOverlay')">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="taskModalTitle">Nouveau chantier</h3>

    <div class="fg">
      <label>Type de travail</label>
      <div class="type-grid" id="typeGrid"></div>
    </div>
    <div class="fg">
      <label>Nom du chantier</label>
      <input type="text" id="tName" placeholder="ex : Terrasse Tremblay" maxlength="60">
    </div>
    <div class="fg">
      <label>Client</label>
      <input type="text" id="tClient" placeholder="ex : M. Tremblay" maxlength="50">
    </div>
    <div class="fg">
      <label>Jour</label>
      <select id="tDay"></select>
    </div>
    <div class="fg">
      <label>Priorité</label>
      <select id="tPrio">
        <option value="urgent">🔴 Urgente</option>
        <option value="high">🟠 Haute</option>
        <option value="medium" selected>🟡 Moyenne</option>
        <option value="low">🟢 Basse</option>
      </select>
    </div>

    <!-- Confirmation suppression (cachée par défaut) -->
    <div class="del-confirm" id="delConfirm" style="display:none">
      <span>⚠ Supprimer ce chantier définitivement ?</span>
      <button class="btn-del-no"  onclick="hideDelConfirm()">Non</button>
      <button class="btn-del-yes" onclick="confirmDelTask()">Oui, supprimer</button>
    </div>

    <div class="mf">
      <button class="btn-cancel" onclick="closeModal('taskOverlay')">Annuler</button>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════ */
const DAYS_L = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAYS_S = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

const JOB_TYPES = {
  beton:      { name:'Béton',       icon:'🏗️', short:'Béton'   },
  hauteur:    { name:'En hauteur',  icon:'🧗', short:'Hauteur' },
  pave:       { name:'Pavé',        icon:'🧱', short:'Pavé'    },
  excavation: { name:'Excavation',  icon:'🚜', short:'Excav.'  },
  paysagisme: { name:'Paysagisme',  icon:'🌿', short:'Paysage' },
  electrique: { name:'Électrique',  icon:'⚡', short:'Électr.' },
  toiture:    { name:'Toiture',     icon:'🏠', short:'Toiture' },
  peinture:   { name:'Peinture',    icon:'🎨', short:'Peinture'},
};

const RISK_RULES = {
  beton: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — bétonnage interdit' },
    { t: w => w.temp_min < 5,       l:'danger', m:'Gel < 5°C — prise impossible' },
    { t: w => w.precipitation > 5,  l:'danger', m:'Pluie > 5mm — prise compromise' },
    { t: w => w.precipitation > 2,  l:'risk',   m:'Pluie > 2mm — qualité réduite' },
    { t: w => w.temp_min < 10,      l:'risk',   m:'Froid — prise lente' },
    { t: w => w.windspeed > 50,     l:'risk',   m:'Vent fort — surface compromise' },
  ],
  hauteur: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — arrêt immédiat' },
    { t: w => w.windspeed > 40,     l:'danger', m:'Vent > 40km/h — DANGER VITAL' },
    { t: w => w.precipitation > 5,  l:'risk',   m:'Pluie — surface glissante' },
    { t: w => w.windspeed > 25,     l:'risk',   m:'Vent > 25km/h — vigilance' },
    { t: w => [45,48].includes(w.weathercode), l:'risk', m:'Brouillard — visibilité réduite' },
  ],
  pave: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — arrêt chantier' },
    { t: w => w.precipitation > 10, l:'danger', m:'Pluie > 10mm — joint impossible' },
    { t: w => w.precipitation > 5,  l:'risk',   m:'Pluie > 5mm — qualité compromise' },
    { t: w => w.temp_min < 0,       l:'risk',   m:'Gel — sable de pose instable' },
  ],
  excavation: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — sécurité machines' },
    { t: w => w.precipitation > 20, l:'risk',   m:'Pluie > 20mm — sol instable' },
    { t: w => w.windspeed > 60,     l:'risk',   m:'Vent > 60km/h — poussière' },
  ],
  paysagisme: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — danger' },
    { t: w => w.precipitation > 15, l:'risk',   m:'Pluie > 15mm — plantation compromise' },
    { t: w => w.temp_max > 35,      l:'risk',   m:'Canicule > 35°C — stress hydrique' },
  ],
  electrique: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — DANGER ÉLECTROCUTION' },
    { t: w => w.precipitation > 2,  l:'danger', m:'Pluie — risque électrique' },
    { t: w => w.precipitation > 0,  l:'risk',   m:'Humidité — précautions requises' },
  ],
  toiture: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — danger électrique/vent' },
    { t: w => w.windspeed > 35,     l:'danger', m:'Vent > 35km/h — chute de matériaux' },
    { t: w => w.precipitation > 2,  l:'danger', m:'Pluie — surface glissante' },
    { t: w => w.windspeed > 20,     l:'risk',   m:'Vent > 20km/h — pose difficile' },
  ],
  peinture: [
    { t: w => w.weathercode >= 95,  l:'danger', m:'Orage — peinture perdue' },
    { t: w => w.precipitation > 0,  l:'danger', m:'Pluie — séchage impossible' },
    { t: w => w.temp_min < 10,      l:'risk',   m:'Froid < 10°C — séchage lent' },
    { t: w => w.temp_max > 35,      l:'risk',   m:'Chaleur > 35°C — bulles/craquelures' },
    { t: w => w.windspeed > 30,     l:'risk',   m:'Vent > 30km/h — poussière' },
  ],
};

const WMO = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'❄️', 75:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};

function wIcon(code) {
  const keys = Object.keys(WMO).map(Number).sort((a,b) => b-a);
  for (const k of keys) if (code >= k) return WMO[k];
  return '☁️';
}
function wLabel(code) {
  if (code === 0)  return 'Ensoleillé';
  if (code <= 3)   return ['','Peu nuageux','Partiellement nuageux','Nuageux'][code];
  if (code <= 48)  return 'Brouillard';
  if (code <= 55)  return 'Bruine';
  if (code <= 65)  return 'Pluie';
  if (code <= 75)  return 'Neige';
  if (code <= 82)  return 'Averses';
  return 'Orage';
}

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let ST = {
  loc:      { lat: 45.3584, lon: -73.2728, name: 'Saint-Jean-sur-Richelieu' },
  forecast: null,
  tasks:    [],
};

let _editingId  = null; // null = création, string = id du chantier édité
let _dayPending = 0;

function loadST() {
  try {
    const raw = localStorage.getItem('spm_v2');
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.loc   && typeof p.loc.lat === 'number') ST.loc   = p.loc;
    if (Array.isArray(p.tasks))                   ST.tasks = p.tasks;
  } catch {}
}
function saveST() {
  try { localStorage.setItem('spm_v2', JSON.stringify({ loc: ST.loc, tasks: ST.tasks })); } catch {}
}

/* ═══════════════════════════════════════════════════
   WEATHER — Open-Meteo (free, no API key)
═══════════════════════════════════════════════════ */
async function fetchForecast(lat, lon) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 9000);
  try {
    const url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + lat + '&longitude=' + lon
      + '&daily=weathercode,temperature_2m_max,temperature_2m_min'
      + ',precipitation_sum,windspeed_10m_max,precipitation_probability_max'
      + '&timezone=auto&forecast_days=7';
    const res  = await fetch(url, { signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d    = await res.json();
    return d.daily.time.map((dt, i) => ({
      date:          new Date(dt + 'T12:00:00'),
      weathercode:   d.daily.weathercode[i]                       ?? 3,
      temp_max:      Math.round(d.daily.temperature_2m_max[i]     ?? 15),
      temp_min:      Math.round(d.daily.temperature_2m_min[i]     ?? 8),
      precipitation: Math.round(d.daily.precipitation_sum[i]      ?? 0),
      windspeed:     Math.round(d.daily.windspeed_10m_max[i]      ?? 10),
      rain_prob:     Math.round(d.daily.precipitation_probability_max[i] ?? 0),
    }));
  } finally { clearTimeout(tid); }
}

function mockForecast() {
  const now = new Date(); now.setHours(12,0,0,0);
  return [
    { weathercode:  0, temp_max:22, temp_min:12, precipitation:0,  windspeed:8,  rain_prob:5  },
    { weathercode:  1, temp_max:24, temp_min:14, precipitation:0,  windspeed:12, rain_prob:10 },
    { weathercode: 63, temp_max:16, temp_min:10, precipitation:14, windspeed:24, rain_prob:85 },
    { weathercode: 95, temp_max:18, temp_min:13, precipitation:22, windspeed:47, rain_prob:98 },
    { weathercode:  2, temp_max:21, temp_min:11, precipitation:2,  windspeed:18, rain_prob:30 },
    { weathercode:  0, temp_max:25, temp_min:13, precipitation:0,  windspeed:9,  rain_prob:5  },
    { weathercode:  1, temp_max:23, temp_min:12, precipitation:0,  windspeed:10, rain_prob:8  },
  ].map((s, i) => {
    const d = new Date(now); d.setDate(now.getDate() + i);
    return Object.assign({}, s, { date: d });
  });
}

/* ═══════════════════════════════════════════════════
   RISK ENGINE
═══════════════════════════════════════════════════ */
function assess(jobType, w) {
  const rules = RISK_RULES[jobType] || [];
  let level = 'ok', msg = '✓ Conditions favorables';
  for (const r of rules) {
    if (!r.t(w)) continue;
    if (r.l === 'danger') return { level:'danger', msg: r.m };
    if (level !== 'danger') { level = 'risk'; msg = r.m; }
  }
  return { level, msg };
}

function dayOverallRisk(w) {
  let worst = 'ok';
  for (const type of Object.keys(RISK_RULES)) {
    const { level } = assess(type, w);
    if (level === 'danger') return 'danger';
    if (level === 'risk')   worst = 'risk';
  }
  return worst;
}

/* ═══════════════════════════════════════════════════
   SWAP INTELLIGENCE
═══════════════════════════════════════════════════ */
function swapSuggestions() {
  if (!ST.forecast) return [];
  const out = [], seen = new Set();
  for (const task of ST.tasks) {
    const key = task.id + '_' + task.dayIndex;
    if (seen.has(key)) continue;
    seen.add(key);
    const cur = ST.forecast[task.dayIndex];
    if (!cur) continue;
    const { level: curLvl } = assess(task.type, cur);
    if (curLvl === 'ok') continue;
    let bestIdx = null;
    for (let i = 0; i < ST.forecast.length; i++) {
      if (i === task.dayIndex) continue;
      const { level } = assess(task.type, ST.forecast[i]);
      if (level === 'ok') { bestIdx = i; break; }
      if (bestIdx === null && level === 'risk' && curLvl === 'danger') bestIdx = i;
    }
    if (bestIdx === null) continue;
    const fromName = DAYS_L[cur.date.getDay()];
    const toName   = DAYS_L[ST.forecast[bestIdx].date.getDay()];
    const jd       = JOB_TYPES[task.type] || {};
    out.push({
      taskId: task.id, toDay: bestIdx, level: curLvl,
      label: (jd.icon || '') + ' ' + task.name + ' — ' + fromName + ' → ' + toName,
    });
  }
  return out;
}

/* ═══════════════════════════════════════════════════
   RENDER — BOARD
═══════════════════════════════════════════════════ */
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  if (!ST.forecast) { renderSkel(board); return; }
  const today = new Date(); today.setHours(0,0,0,0);
  ST.forecast.forEach(function(day, di) {
    const d = new Date(day.date); d.setHours(0,0,0,0);
    const isToday  = d.getTime() === today.getTime();
    const dayRisk  = dayOverallRisk(day);
    const tasks    = ST.tasks.filter(function(t) { return t.dayIndex === di; });
    const windCls  = day.windspeed > 40 ? 'bad' : day.windspeed > 25 ? 'warn' : '';
    const rainCls  = day.rain_prob > 70 ? 'bad' : day.rain_prob > 40 ? 'warn' : '';
    const mon      = MONTHS[day.date.getMonth()];
    const col      = document.createElement('div');
    col.className  = 'day-col';
    col.innerHTML  =
      '<div class="day-hd' + (isToday ? ' today' : '') + '">'
      + '<div class="risk-bar ' + dayRisk + '"></div>'
      + '<div class="day-hd-body">'
      + '<div class="day-lbl">' + esc(DAYS_S[day.date.getDay()].toUpperCase()) + (isToday ? ' · Auj.' : '') + '</div>'
      + '<div class="day-num">' + day.date.getDate() + ' <span style="font-size:.85rem;color:var(--text2)">' + mon + '</span></div>'
      + '<div class="day-wx-row">'
      + '<div class="day-wx-icon">' + wIcon(day.weathercode) + '</div>'
      + '<div class="day-wx-info">'
      + '<div class="day-temps"><span class="hi">' + day.temp_max + '°</span><span class="lo"> / ' + day.temp_min + '°</span></div>'
      + '<div class="day-wx-lbl">' + wLabel(day.weathercode) + '</div>'
      + '</div></div>'
      + '<div class="day-chips">'
      + '<span class="chip' + (windCls ? ' ' + windCls : '') + '" title="Vent max">💨' + day.windspeed + 'km/h</span>'
      + '<span class="chip' + (rainCls ? ' ' + rainCls : '') + '" title="Probabilité pluie">🌧' + day.rain_prob + '%</span>'
      + '</div>'
      + '<div class="risk-badge ' + dayRisk + '">'
      + (dayRisk === 'ok' ? '✓ OK' : dayRisk === 'risk' ? '⚠ Risque' : '✕ Danger')
      + '</div>'
      + '</div></div>'
      + '<div class="task-slot" id="slot-' + di + '"></div>'
      + '<button class="add-btn" onclick="openAddTask(' + di + ')">+ Ajouter un chantier</button>';
    board.appendChild(col);
    const slot = col.querySelector('#slot-' + di);
    tasks.forEach(function(task) { slot.appendChild(mkTaskCard(task, day)); });
  });
  renderSwapBanner();
}

/* Build a task card — uses plain string concat, NO template literals,
   NO inline onclick with dynamic IDs. Interaction is handled by the
   board-level delegated listener registered in DOMContentLoaded.      */
function mkTaskCard(task, dayW) {
  var jd = JOB_TYPES[task.type] || { icon: '🔧', name: task.type };
  var res = assess(task.type, dayW);
  var level = res.level;
  var msg   = res.msg;
  var card  = document.createElement('div');
  card.className    = 'task-card ' + level;
  card.dataset.taskId = task.id;   // used by the delegated listener
  var lvlIcon = level === 'ok' ? '✓' : level === 'risk' ? '⚠' : '✕';
  var html =
    '<div class="tc-actions">'
    + '<button class="tc-edit-btn" title="Modifier">✏️</button>'
    + '<button class="tc-del-btn"  title="Supprimer">🗑️</button>'
    + '</div>'
    + '<div class="tc-icon">'   + jd.icon + '</div>'
    + '<div class="tc-name">'   + esc(task.name) + '</div>';
  if (task.client) {
    html += '<div class="tc-client">' + esc(task.client) + '</div>';
  }
  html += '<div class="tc-risk ' + level + '">' + lvlIcon + ' ' + esc(msg) + '</div>';
  card.innerHTML = html;
  return card;
}

function renderSkel(board) {
  for (var i = 0; i < 7; i++) {
    var c = document.createElement('div');
    c.className = 'day-col';
    c.innerHTML =
      '<div class="skel" style="height:196px"></div>'
      + '<div class="skel" style="height:42px;margin-top:8px"></div>';
    board.appendChild(c);
  }
}

function renderSwapBanner() {
  var banner = document.getElementById('swapBanner');
  var list   = document.getElementById('swapList');
  list.innerHTML = '';
  var suggestions = swapSuggestions();
  if (!suggestions.length) { banner.classList.remove('show'); return; }
  banner.classList.add('show');
  suggestions.forEach(function(s) {
    var p = document.createElement('div');
    p.className = 'swap-pill' + (s.level === 'danger' ? ' sev-danger' : '');
    p.innerHTML =
      '<span>' + (s.level === 'danger' ? '🚨' : '⚠️') + '</span>'
      + '<span class="sp-txt">' + esc(s.label) + '</span>'
      + '<button class="sp-btn" onclick="applySwap(\'' + esc(s.taskId) + '\',' + s.toDay + ')">Déplacer →</button>';
    list.appendChild(p);
  });
}

/* ═══════════════════════════════════════════════════
   TASK MODAL — CRÉATION
═══════════════════════════════════════════════════ */
function openAddTask(dayIdx) {
  _editingId  = null;
  _dayPending = dayIdx;
  document.getElementById('taskModalTitle').textContent = 'Nouveau chantier';
  document.getElementById('tName').value   = '';
  document.getElementById('tClient').value = '';
  document.getElementById('tPrio').value   = 'medium';
  document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('sel'); });
  var first = document.querySelector('.type-btn');
  if (first) first.classList.add('sel');
  populateDaySelect(dayIdx);
  document.getElementById('btnDel').style.display     = 'none';
  document.getElementById('btnSave').textContent      = 'Ajouter →';
  document.getElementById('delConfirm').style.display = 'none';
  openModal('taskOverlay');
  setTimeout(function() { document.getElementById('tName').focus(); }, 120);
}

/* ═══════════════════════════════════════════════════
   TASK MODAL — ÉDITION
═══════════════════════════════════════════════════ */
function openEditTask(id) {
  var task = ST.tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  _editingId  = id;
  _dayPending = task.dayIndex;
  document.getElementById('taskModalTitle').textContent = 'Modifier le chantier';
  document.getElementById('tName').value   = task.name   || '';
  document.getElementById('tClient').value = task.client || '';
  document.getElementById('tPrio').value   = task.priority || 'medium';
  document.querySelectorAll('.type-btn').forEach(function(b) {
    b.classList.toggle('sel', b.dataset.type === task.type);
  });
  populateDaySelect(task.dayIndex);
  document.getElementById('btnDel').style.display     = '';
  document.getElementById('btnSave').textContent      = 'Enregistrer les modifications';
  document.getElementById('delConfirm').style.display = 'none';
  openModal('taskOverlay');
}

function openEditTaskDelete(id) {
  openEditTask(id);
  requestAnimationFrame(showDelConfirm);
}

/* ═══════════════════════════════════════════════════
   SÉLECTEUR DE JOUR
═══════════════════════════════════════════════════ */
function populateDaySelect(selectedIdx) {
  var sel = document.getElementById('tDay');
  sel.innerHTML = '';
  var now = new Date(); now.setHours(0, 0, 0, 0);
  for (var i = 0; i < 7; i++) {
    var opt = document.createElement('option');
    opt.value = String(i);
    if (ST.forecast && ST.forecast[i]) {
      var day  = ST.forecast[i];
      var name = DAYS_L[day.date.getDay()];
      var dt   = day.date.getDate() + ' ' + MONTHS[day.date.getMonth()];
      opt.textContent = name + ' · ' + dt + (i === 0 ? ' (auj.)' : '');
    } else {
      var dd = new Date(now); dd.setDate(now.getDate() + i);
      opt.textContent = DAYS_L[dd.getDay()] + (i === 0 ? ' (auj.)' : '');
    }
    if (i === selectedIdx) opt.selected = true;
    sel.appendChild(opt);
  }
}

/* ═══════════════════════════════════════════════════
   SAVE — CRÉATION ET MODIFICATION
═══════════════════════════════════════════════════ */
function saveTask() {
  var name   = document.getElementById('tName').value.trim();
  var client = document.getElementById('tClient').value.trim();
  var prio   = document.getElementById('tPrio').value;
  var dayIdx = parseInt(document.getElementById('tDay').value, 10);
  var sel    = document.querySelector('.type-btn.sel');
  if (!name) { toast('⚠ Nom du chantier requis'); return; }
  if (!sel)  { toast('⚠ Sélectionnez un type de travail'); return; }
  var patch = { name: name, client: client, type: sel.dataset.type, priority: prio, dayIndex: dayIdx };
  if (_editingId) {
    var idx = ST.tasks.findIndex(function(t) { return t.id === _editingId; });
    if (idx !== -1) ST.tasks[idx] = Object.assign({}, ST.tasks[idx], patch);
    toast('✓ Chantier modifié');
  } else {
    var newId = (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
    ST.tasks.push(Object.assign({ id: newId }, patch));
    toast('✓ Chantier ajouté');
  }
  saveST();
  closeModal('taskOverlay');
  renderBoard();
}

/* ═══════════════════════════════════════════════════
   SUPPRESSION AVEC CONFIRMATION
═══════════════════════════════════════════════════ */
function showDelConfirm() {
  document.getElementById('delConfirm').style.display = 'flex';
  document.getElementById('btnDel').style.display     = 'none';
}
function hideDelConfirm() {
  document.getElementById('delConfirm').style.display = 'none';
  document.getElementById('btnDel').style.display     = '';
}
function confirmDelTask() {
  if (!_editingId) return;
  ST.tasks = ST.tasks.filter(function(t) { return t.id !== _editingId; });
  saveST();
  closeModal('taskOverlay');
  renderBoard();
  toast('Chantier supprimé');
}

/* ═══════════════════════════════════════════════════
   SWAP
═══════════════════════════════════════════════════ */
function applySwap(taskId, toDay) {
  var task = ST.tasks.find(function(t) { return t.id === taskId; });
  if (!task) return;
  var fromName = DAYS_L[ST.forecast[task.dayIndex] && ST.forecast[task.dayIndex].date.getDay()] || '?';
  var toName   = DAYS_L[ST.forecast[toDay]         && ST.forecast[toDay].date.getDay()]         || '?';
  task.dayIndex = toDay;
  saveST(); renderBoard();
  toast('✓ Déplacé de ' + fromName + ' → ' + toName);
}

function buildTypeGrid() {
  var g = document.getElementById('typeGrid');
  g.innerHTML = '';
  var entries = Object.entries(JOB_TYPES);
  entries.forEach(function(entry, i) {
    var key = entry[0], def = entry[1];
    var b = document.createElement('button');
    b.type = 'button';
    b.className   = 'type-btn' + (i === 0 ? ' sel' : '');
    b.dataset.type = key;
    b.innerHTML   = '<span class="ti">' + def.icon + '</span>' + esc(def.short);
    b.onclick = function() {
      g.querySelectorAll('.type-btn').forEach(function(x) { x.classList.remove('sel'); });
      b.classList.add('sel');
    };
    g.appendChild(b);
  });
}

/* ═══════════════════════════════════════════════════
   LOCATION MODAL
═══════════════════════════════════════════════════ */
var _searchTimer = null;

function openLocModal() {
  document.getElementById('locSearch').value = '';
  document.getElementById('locResults').innerHTML = '';
  openModal('locOverlay');
  setTimeout(function() { document.getElementById('locSearch').focus(); }, 120);
}

function schedSearch(q) {
  clearTimeout(_searchTimer);
  var res = document.getElementById('locResults');
  if (q.length < 2) { res.innerHTML = ''; return; }
  _searchTimer = setTimeout(function() { doSearch(q); }, 380);
}

async function doSearch(q) {
  var res = document.getElementById('locResults');
  res.innerHTML = '<div class="loc-empty">Recherche…</div>';
  try {
    var url  = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=5';
    var data = await (await fetch(url, { headers: { 'Accept-Language': 'fr' } })).json();
    res.innerHTML = '';
    if (!data.length) { res.innerHTML = '<div class="loc-empty">Aucun résultat</div>'; return; }
    data.forEach(function(r) {
      var el = document.createElement('div');
      el.className   = 'loc-item';
      el.textContent = r.display_name;
      el.onclick = function() { setLoc(+r.lat, +r.lon, r.display_name.split(',')[0].trim()); };
      res.appendChild(el);
    });
  } catch(e) { res.innerHTML = '<div class="loc-empty">Recherche impossible (réseau)</div>'; }
}

async function geolocate() {
  if (!navigator.geolocation) { toast('GPS non disponible'); return; }
  toast('📍 Géolocalisation en cours…');
  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      var name = 'Ma position';
      try {
        var url = 'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json';
        var d   = await (await fetch(url, { headers: { 'Accept-Language': 'fr' } })).json();
        name = (d.address && (d.address.city || d.address.town || d.address.village))
          || (d.display_name && d.display_name.split(',')[0])
          || name;
      } catch(e) {}
      setLoc(lat, lon, name);
      closeModal('locOverlay');
    },
    function() { toast('⚠ GPS refusé ou indisponible'); }
  );
}

async function setLoc(lat, lon, name) {
  ST.loc = { lat: lat, lon: lon, name: name };
  document.getElementById('locName').textContent = name;
  saveST();
  closeModal('locOverlay');
  await loadWeather();
}

/* ═══════════════════════════════════════════════════
   WEATHER LOADING
═══════════════════════════════════════════════════ */
async function loadWeather() {
  setDot('loading');
  ST.forecast = null;
  renderBoard();
  try {
    ST.forecast = await fetchForecast(ST.loc.lat, ST.loc.lon);
    setDot('ok');
  } catch(err) {
    console.warn('Open-Meteo fallback:', err.message);
    ST.forecast = mockForecast();
    setDot('offline');
    toast('⚠ Météo simulée — vérifiez votre connexion');
  }
  updateWeatherPill();
  renderBoard();
}

function updateWeatherPill() {
  if (!ST.forecast || !ST.forecast.length) return;
  var d = ST.forecast[0];
  document.getElementById('wIcon').textContent = wIcon(d.weathercode);
  document.getElementById('wTemp').textContent = d.temp_max + '° / ' + d.temp_min + '°';
  document.getElementById('wDesc').textContent = wLabel(d.weathercode);
}

function setDot(state) {
  var dot = document.getElementById('locDot');
  dot.className = 'loc-dot' + (state !== 'ok' ? ' ' + state : '');
  if (state === 'ok') {
    dot.style.background = 'var(--ok)';
    dot.style.boxShadow  = '0 0 8px var(--ok)';
  } else if (state === 'loading') {
    dot.style.background = 'var(--risk)';
    dot.style.boxShadow  = '0 0 8px var(--risk)';
  } else {
    dot.style.background = 'var(--text3)';
    dot.style.boxShadow  = 'none';
  }
}

/* ═══════════════════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════════════════ */
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function overlayClick(e, id) { if (e.target.id === id) closeModal(id); }

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
var _toastT;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(function() { t.classList.remove('show'); }, 2400);
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
  loadST();
  buildTypeGrid();
  document.getElementById('locName').textContent = ST.loc.name;

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeModal('taskOverlay');
      closeModal('locOverlay');
    }
  });

  /* Delegated handler for task card clicks — fires for every click inside
     #board. Identifies the target card via data-task-id, then dispatches
     to edit (body click) or delete+confirm (🗑️ button click).           */
  document.getElementById('board').addEventListener('click', function(e) {
    var card = e.target.closest('[data-task-id]');
    if (!card) return;
    var id = card.dataset.taskId;
    if (e.target.closest('.tc-del-btn')) {
      openEditTaskDelete(id);
    } else {
      openEditTask(id);
    }
  });

  loadWeather();
});
</script>
