<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>SmartPlan Météo</title>
<style>
:root{
  --bg:#0b0f14;--card:#141a24;--card2:#1c2431;--line:#2c3648;--text:#f2f5f8;--muted:#a5afc0;
  --accent:#00d4aa;--blue:#3b82f6;--ok:#22c55e;--risk:#f59e0b;--danger:#ef4444;
  --r:18px;--shadow:0 18px 45px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:18px;line-height:1.45;padding-bottom:92px}
button,input,select,textarea{font:inherit}
.header{position:sticky;top:0;z-index:20;background:rgba(11,15,20,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px}
.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand h1{font-size:24px;line-height:1}.brand small{display:block;color:var(--muted);font-size:13px;margin-top:3px}.logo{display:flex;align-items:center;gap:11px}.bolt{width:42px;height:42px;border-radius:13px;background:var(--accent);display:grid;place-items:center;color:#001b15;font-weight:900}.clock{color:var(--muted);font-size:14px}
.wrap{padding:16px;max-width:900px;margin:0 auto}.section{display:none}.section.active{display:block}.grid{display:grid;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.title{font-weight:900;font-size:24px;margin-bottom:12px}.sub{color:var(--muted);font-size:15px}.pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 12px;font-size:14px;font-weight:800;background:var(--card2);border:1px solid var(--line)}.pill.ok{color:#86efac;background:rgba(34,197,94,.13);border-color:rgba(34,197,94,.35)}.pill.risk{color:#fde68a;background:rgba(245,158,11,.13);border-color:rgba(245,158,11,.35)}.pill.danger{color:#fecaca;background:rgba(239,68,68,.13);border-color:rgba(239,68,68,.35)}
.btn{min-height:50px;border:0;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer;background:var(--card2);color:var(--text);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.primary{background:var(--accent);color:#001b15;border-color:var(--accent)}.btn.blue{background:var(--blue);color:white;border-color:var(--blue)}.btn.red{background:rgba(239,68,68,.15);color:#fecaca;border-color:rgba(239,68,68,.4)}.btn.full{width:100%}.btn.small{min-height:40px;padding:8px 11px;border-radius:11px;font-size:15px}
.weather{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}.wxicon{font-size:52px}.temp{font-size:48px;font-weight:950;color:var(--accent);line-height:1}.wxstats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.stat{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px}.stat label{display:block;color:var(--muted);font-size:13px;text-transform:uppercase}.stat strong{font-size:22px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.sum{padding:14px;text-align:center;border-radius:16px;background:var(--card);border:1px solid var(--line)}.sum strong{font-size:34px;display:block}.sum.ok strong{color:var(--ok)}.sum.risk strong{color:var(--risk)}.sum.danger strong{color:var(--danger)}
.job{position:relative;border-left:6px solid var(--line)}.job.ok{border-left-color:var(--ok)}.job.risk{border-left-color:var(--risk)}.job.danger{border-left-color:var(--danger)}.job h3{font-size:24px;line-height:1.15;margin-bottom:6px}.meta{display:flex;gap:9px;flex-wrap:wrap;color:var(--muted);font-size:15px;margin:9px 0}.conds{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.cond{font-size:14px;border:1px solid var(--line);background:var(--card2);padding:7px 10px;border-radius:10px;color:var(--muted)}.cond.bad{color:#fecaca;border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.1)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:13px}.hint{padding:12px 14px;border-radius:14px;background:var(--card2);border-left:4px solid var(--line);color:var(--muted)}.hint.ok{border-color:var(--ok);color:#bbf7d0}.hint.risk{border-color:var(--risk);color:#fde68a}.hint.danger{border-color:var(--danger);color:#fecaca}
.bottom{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(20,26,36,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding:7px 4px calc(7px + env(safe-area-inset-bottom))}.nav{background:transparent;border:0;color:var(--muted);font-size:12px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 3px;border-radius:13px}.nav span{font-size:23px}.nav.active{color:var(--accent);background:rgba(0,212,170,.10)}
.form{display:grid;gap:13px}.fg label{display:block;color:var(--muted);font-size:14px;text-transform:uppercase;font-weight:800;margin-bottom:6px}.fc{width:100%;min-height:52px;border-radius:14px;border:1px solid var(--line);background:var(--card2);color:var(--text);padding:12px 14px;outline:none}.fc:focus{border-color:var(--accent)}textarea.fc{min-height:90px}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:12px}.prio{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.prio button{min-height:62px;font-size:14px}.prio button.sel{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,.08)}
.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--card);border:1px solid var(--line);padding:5px;border-radius:15px;margin-bottom:14px}.seg button{border:0;background:transparent;color:var(--muted);border-radius:11px;padding:10px;font-weight:900}.seg button.active{background:var(--accent);color:#001b15}.calTitle{font-size:18px;font-weight:900;text-align:center;min-width:180px}.timeline{display:grid;grid-template-columns:56px 1fr;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--line)}.hour{background:var(--card2);min-height:74px;padding:8px;color:var(--muted);font-size:14px;text-align:right}.slot{min-height:74px;background:var(--card);position:relative;border-bottom:1px solid var(--line);padding:6px;cursor:pointer}.slot:active{background:var(--card2)}.slotEmpty{opacity:.18;font-size:14px;text-align:center;margin-top:18px}.event{border-radius:13px;padding:9px 40px 9px 10px;margin:2px 0;background:rgba(0,212,170,.13);border-left:4px solid var(--accent);position:relative}.event strong{display:block;font-size:16px}.event small{color:var(--muted)}.event .x{position:absolute;right:6px;top:6px;width:30px;height:30px;border-radius:50%;border:0;background:rgba(239,68,68,.18);color:#fecaca;font-weight:900}
.month{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--line)}.mh,.mc{background:var(--card);padding:7px 5px}.mh{font-size:12px;color:var(--muted);text-align:center;font-weight:900}.mc{min-height:78px;cursor:pointer}.mc.other{opacity:.35}.mc.today{outline:2px solid var(--accent);outline-offset:-2px}.daynum{font-size:13px;font-weight:900}.dot{display:inline-block;width:8px;height:8px;background:var(--risk);border-radius:50%;margin-left:3px}.mevent{font-size:11px;margin-top:4px;padding:3px 5px;background:rgba(0,212,170,.12);border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.weekList{display:grid;gap:10px}.weekDay{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}.fab{position:fixed;right:18px;bottom:98px;z-index:35;width:62px;height:62px;border-radius:50%;background:var(--accent);color:#001b15;border:0;font-size:34px;font-weight:900;box-shadow:var(--shadow)}
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);display:none;align-items:flex-end}.modal.open{display:flex}.sheet{width:100%;max-width:900px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-bottom:0;border-radius:24px 24px 0 0;padding:18px;max-height:90vh;overflow:auto}.handle{width:44px;height:5px;background:var(--line);border-radius:99px;margin:0 auto 14px}.toast{position:fixed;left:50%;bottom:105px;transform:translateX(-50%) translateY(25px);z-index:80;opacity:0;transition:.25s;background:var(--card);border:1px solid var(--line);padding:13px 16px;border-radius:14px;box-shadow:var(--shadow);max-width:92vw;text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){body{font-size:17px}.wrap{padding:12px}.brand h1{font-size:21px}.clock{display:none}.wxstats{grid-template-columns:1fr}.summary{gap:7px}.sum{padding:11px 6px}.sum strong{font-size:28px}.actions{grid-template-columns:1fr}.twocol{grid-template-columns:1fr}.prio{grid-template-columns:1fr 1fr}.mc{min-height:66px}.mevent{display:none}.nav{font-size:11px}.btn{font-size:16px}.job h3{font-size:22px}}
</style>
</head>
<body>
<header class="header"><div class="brand"><div class="logo"><div class="bolt">⚡</div><div><h1>SmartPlan Météo</h1><small id="modeLabel">Démo météo simulée</small></div></div><div class="clock" id="clock">--:--</div></div></header>
<main class="wrap">
<section id="dashboard" class="section active">
  <div class="card weather"><div class="wxicon" id="wxIcon">⛅</div><div><div class="temp" id="wxTemp">14°C</div><div id="wxDesc" class="sub">Partiellement nuageux</div><button class="btn primary small" style="margin-top:10px" onclick="getRealWeather()">📍 Météo réelle</button></div></div>
  <div class="wxstats"><div class="stat"><label>Vent</label><strong id="wxWind">32 km/h</strong></div><div class="stat"><label>Pluie</label><strong id="wxRain">4 mm</strong></div><div class="stat"><label>Ressenti</label><strong id="wxFeel">9°C</strong></div></div>
  <div style="height:14px"></div><div class="summary"><div class="sum ok"><strong id="cOk">0</strong><span>OK</span></div><div class="sum risk"><strong id="cRisk">0</strong><span>Risque</span></div><div class="sum danger"><strong id="cDanger">0</strong><span>Danger</span></div></div>
  <div style="height:18px"></div><div class="row"><h2 class="title" style="margin:0">Jobs du jour</h2><button class="btn primary" onclick="openJobModal()">+ Créer</button></div><div id="dashJobs" class="grid" style="margin-top:14px"></div>
</section>
<section id="calendar" class="section">
  <button class="btn blue full" onclick="autoPlanAll()">🔮 Planification automatique</button><div class="seg"><button id="vDay" class="active" onclick="setCalView('day')">Jour</button><button id="vWeek" onclick="setCalView('week')">7 jours</button><button id="vMonth" onclick="setCalView('month')">Mois</button></div>
  <div class="toolbar"><button class="btn small" onclick="moveDate(-1)">‹</button><div class="calTitle" id="calTitle">—</div><button class="btn small" onclick="moveDate(1)">›</button><button class="btn small primary" onclick="todayCal()">Auj.</button></div><div id="calArea"></div>
</section>
<section id="create" class="section"><div class="card"><h2 class="title">Créer un job</h2><div id="createForm"></div></div></section>
<section id="list" class="section"><div class="row"><h2 class="title" style="margin:0">Tous les jobs</h2><button class="btn primary" onclick="openJobModal()">+ Créer</button></div><div id="allJobs" class="grid" style="margin-top:14px"></div></section>
<section id="weather" class="section"><div class="card"><h2 class="title">Météo</h2><p class="sub">Utilise les sliders pour tester les alertes, ou active la météo réelle.</p><button class="btn primary full" onclick="getRealWeather()">📍 Utiliser ma position</button><div style="height:15px"></div><div class="fg"><label>Vent: <span id="sWindVal">32</span> km/h</label><input class="fc" type="range" id="sWind" min="0" max="120" value="32" oninput="sliderWeather()"></div><div class="fg"><label>Pluie: <span id="sRainVal">4</span> mm</label><input class="fc" type="range" id="sRain" min="0" max="50" value="4" oninput="sliderWeather()"></div><div class="fg"><label>Température: <span id="sTempVal">14</span> °C</label><input class="fc" type="range" id="sTemp" min="-25" max="40" value="14" oninput="sliderWeather()"></div></div></section>
</main>
<nav class="bottom"><button class="nav active" onclick="tab('dashboard',this)"><span>📊</span>Accueil</button><button class="nav" onclick="tab('calendar',this)"><span>📅</span>Agenda</button><button class="nav" onclick="tab('create',this)"><span>➕</span>Créer</button><button class="nav" onclick="tab('list',this)"><span>📋</span>Liste</button><button class="nav" onclick="tab('weather',this)"><span>🌤</span>Météo</button></nav>
<button class="fab" onclick="openJobModal()">+</button>
<div class="modal" id="jobModal" onclick="if(event.target.id==='jobModal')closeJobModal()"><div class="sheet"><div class="handle"></div><div class="row"><h2 class="title" id="modalTitle">Nouveau job</h2><button class="btn small" onclick="closeJobModal()">✕</button></div><div id="modalForm"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const $=s=>document.querySelector(s); const $$=s=>document.querySelectorAll(s);
let jobs=JSON.parse(localStorage.getItem('spm_jobs')||'[]');
let selectedDate=new Date(); selectedDate.setHours(0,0,0,0);
let calView='day'; let editingId=null; let slotPreset=null;
let wx={temp:14,wind:32,rain:4};
const months=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const monthsFull=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam']; const daysFull=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
function save(){localStorage.setItem('spm_jobs',JSON.stringify(jobs)); render();}
function ymd(d){return d.toISOString().slice(0,10)} function fromYmd(s){let [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function fmtDate(s){if(!s)return '—'; let d=s.includes('T')?s.split('T')[0]:s; let t=s.includes('T')?s.split('T')[1]:''; let [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}${t?' '+t:''}`}
function fmtTime(h){h=Number(h||0); let hr=Math.floor(h), mn=Math.round((h-hr)*60); return `${String(hr).padStart(2,'0')}h${mn?String(mn).padStart(2,'0'):''}`}
function toast(msg){let t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('show'),2500)}
function tab(id,el){$$('.section').forEach(s=>s.classList.remove('active'));$('#'+id).classList.add('active');$$('.nav').forEach(n=>n.classList.remove('active'));el.classList.add('active');window.scrollTo(0,0);render()}
function status(job){let bad=[]; if(wx.wind>job.maxWind)bad.push('vent'); if(wx.rain>job.maxRain)bad.push('pluie'); if(wx.temp<job.minTemp||wx.temp>job.maxTemp)bad.push('température'); if(!bad.length)return {s:'ok',msg:'✅ Conditions parfaites.'}; if(bad.length>=2)return {s:'danger',msg:'🚨 Trop risqué. Reporter ce job.'}; return {s:'risk',msg:'⚠️ À surveiller.'}}
function wxIcon(){if(wx.rain>20)return'⛈';if(wx.rain>5)return'🌧';if(wx.wind>60)return'🌪';if(wx.temp<0)return'❄️';if(wx.rain>0)return'🌦';return wx.wind>40?'🌬':'⛅'}
function wxDesc(){if(wx.rain>20&&wx.wind>50)return'Tempête — danger';if(wx.rain>5)return'Pluie';if(wx.wind>55)return'Vents forts';if(wx.temp<0)return'Gel';return'Conditions variables'}
function jobCard(job){let st=status(job);let d=job.date||'';return `<div class="card job ${st.s}"><div class="row"><div><h3>${esc(job.name)}</h3><div class="sub">${esc(job.client||'Sans client')} ${job.place?'· '+esc(job.place):''}</div></div><span class="pill ${st.s}">${st.s==='ok'?'✅ OK':st.s==='risk'?'⚠️ Risque':'🚨 Danger'}</span></div><div class="meta"><span>📅 ${fmtDate(job.date)}</span><span>🕘 ${job.start?fmtTime(job.start):'—'}</span><span>⏱ ${job.duration||1}h</span><span>🔧 ${esc(job.type||'Autre')}</span><span>🎯 ${esc(job.priority||'moyenne')}</span></div><div class="conds"><span class="cond ${wx.wind>job.maxWind?'bad':''}">💨 ≤${job.maxWind} km/h</span><span class="cond ${wx.rain>job.maxRain?'bad':''}">🌧 ≤${job.maxRain} mm</span><span class="cond ${(wx.temp<job.minTemp||wx.temp>job.maxTemp)?'bad':''}">🌡 ${job.minTemp}° à ${job.maxTemp}°</span></div><div class="hint ${st.s}">${st.msg}</div><div class="actions"><button class="btn" onclick="editJob('${job.id}')">✏️ Modifier</button><button class="btn red" onclick="delJob('${job.id}')">🗑 Supprimer</button></div></div>`}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function renderWeather(){ $('#wxIcon').textContent=wxIcon();$('#wxTemp').textContent=Math.round(wx.temp)+'°C';$('#wxWind').textContent=Math.round(wx.wind)+' km/h';$('#wxRain').textContent=Math.round(wx.rain)+' mm';$('#wxFeel').textContent=Math.round(wx.temp-wx.wind*.15)+'°C';$('#wxDesc').textContent=wxDesc();$('#sWindVal').textContent=Math.round(wx.wind);$('#sRainVal').textContent=Math.round(wx.rain);$('#sTempVal').textContent=Math.round(wx.temp);$('#sWind').value=Math.round(wx.wind);$('#sRain').value=Math.round(wx.rain);$('#sTemp').value=Math.round(wx.temp)}
function render(){renderWeather();let c={ok:0,risk:0,danger:0};jobs.forEach(j=>c[status(j).s]++);$('#cOk').textContent=c.ok;$('#cRisk').textContent=c.risk;$('#cDanger').textContent=c.danger;let todayJobs=jobs.filter(j=>(j.date||'').slice(0,10)===ymd(new Date()));$('#dashJobs').innerHTML=todayJobs.length?todayJobs.map(jobCard).join(''):'<div class="card sub">Aucun job aujourd’hui. Appuie sur + pour créer.</div>';$('#allJobs').innerHTML=jobs.length?jobs.map(jobCard).join(''):'<div class="card sub">Aucun job encore.</div>';renderCalendar();renderForm('#createForm')}
function setCalView(v){calView=v;['Day','Week','Month'].forEach(x=>$('#v'+x).classList.toggle('active',x.toLowerCase()===v));renderCalendar()}
function moveDate(n){if(calView==='month'){selectedDate.setMonth(selectedDate.getMonth()+n);selectedDate.setDate(1)}else selectedDate.setDate(selectedDate.getDate()+(calView==='week'?7*n:n));renderCalendar()}
function todayCal(){selectedDate=new Date();selectedDate.setHours(0,0,0,0);renderCalendar()}
function renderCalendar(){if(!$('#calArea'))return; if(calView==='month')return renderMonth(); if(calView==='week')return renderWeek(); return renderDay()}
function renderDay(){let ds=ymd(selectedDate);$('#calTitle').textContent=`${daysFull[selectedDate.getDay()]} ${selectedDate.getDate()} ${months[selectedDate.getMonth()]}`;let html='<div class="timeline">';for(let h=0;h<24;h++){let items=jobs.filter(j=>(j.date||'').slice(0,10)===ds&&Number(j.start||0)>=h&&Number(j.start||0)<h+1);html+=`<div class="hour">${String(h).padStart(2,'0')}h</div><div class="slot" onclick="openJobModal('${ds}',${h})"><div class="slotEmpty">+ Créer ici</div>${items.map(j=>`<div class="event" onclick="event.stopPropagation();editJob('${j.id}')"><button class="x" onclick="event.stopPropagation();delJob('${j.id}')">×</button><strong>${esc(j.name)}</strong><small>${fmtTime(j.start)} · ${j.duration||1}h</small></div>`).join('')}</div>`}html+='</div>';$('#calArea').innerHTML=html}
function renderWeek(){let d=new Date(selectedDate);let off=d.getDay()===0?-6:1-d.getDay();d.setDate(d.getDate()+off);$('#calTitle').textContent=`Semaine du ${d.getDate()} ${months[d.getMonth()]}`;let html='<div class="weekList">';for(let i=0;i<7;i++){let dd=new Date(d);dd.setDate(d.getDate()+i);let ds=ymd(dd);let items=jobs.filter(j=>(j.date||'').slice(0,10)===ds);html+=`<div class="weekDay" onclick="selectedDate=fromYmd('${ds}');setCalView('day')"><div class="row"><strong>${daysFull[dd.getDay()]} ${dd.getDate()}</strong><button class="btn small primary" onclick="event.stopPropagation();openJobModal('${ds}',8)">+ Job</button></div>${items.length?items.map(j=>`<div class="event" onclick="event.stopPropagation();editJob('${j.id}')"><strong>${esc(j.name)}</strong><small>${fmtTime(j.start)} · ${j.duration||1}h</small></div>`).join(''):'<p class="sub" style="margin-top:8px">Aucun job</p>'}</div>`}html+='</div>';$('#calArea').innerHTML=html}
function renderMonth(){let y=selectedDate.getFullYear(),m=selectedDate.getMonth();$('#calTitle').textContent=`${monthsFull[m]} ${y}`;let first=new Date(y,m,1);let start=first.getDay()===0?6:first.getDay()-1;let dim=new Date(y,m+1,0).getDate();let html='<div class="month">';['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(x=>html+=`<div class="mh">${x}</div>`);for(let i=0;i<42;i++){let num=i-start+1;let cd=new Date(y,m,num);let ds=ymd(cd);let other=cd.getMonth()!==m;let isToday=ds===ymd(new Date());let items=jobs.filter(j=>(j.date||'').slice(0,10)===ds);html+=`<div class="mc ${other?'other':''} ${isToday?'today':''}" onclick="selectedDate=fromYmd('${ds}');setCalView('day')"><div class="daynum">${cd.getDate()}${items.length?'<span class="dot"></span>':''}</div>${items.slice(0,2).map(j=>`<div class="mevent">${esc(j.name)}</div>`).join('')}</div>`}html+='</div>';$('#calArea').innerHTML=html}
function renderForm(target){$(target).innerHTML=`<div class="form"><div class="fg"><label>Nom du job *</label><input class="fc" id="f_name" placeholder="Ex: remplacement poteaux"></div><div class="twocol"><div class="fg"><label>Client</label><input class="fc" id="f_client" placeholder="Hydro-Québec"></div><div class="fg"><label>Lieu / zone</label><input class="fc" id="f_place" placeholder="Secteur Nord"></div></div><div class="twocol"><div class="fg"><label>Type de travail</label><input class="fc" id="f_type" placeholder="Montage lignes"></div><div class="fg"><label>Durée (h)</label><input class="fc" id="f_duration" type="number" min="0.5" step="0.5" value="2"></div></div><div class="twocol"><div class="fg"><label>Date</label><input class="fc" id="f_date" type="date"></div><div class="fg"><label>Heure début</label><input class="fc" id="f_start" type="time"></div></div><div class="fg"><label>Priorité</label><select class="fc" id="f_priority"><option value="basse">Basse</option><option value="moyenne" selected>Moyenne</option><option value="haute">Haute</option><option value="urgente">Urgente</option></select></div><div class="twocol"><div class="fg"><label>Vent max km/h</label><input class="fc" id="f_wind" type="number" value="50"></div><div class="fg"><label>Pluie max mm</label><input class="fc" id="f_rain" type="number" value="5"></div></div><div class="twocol"><div class="fg"><label>Temp min °C</label><input class="fc" id="f_tmin" type="number" value="-5"></div><div class="fg"><label>Temp max °C</label><input class="fc" id="f_tmax" type="number" value="35"></div></div><button class="btn primary full" onclick="saveForm('${target}')">✅ Créer</button></div>`}
function openJobModal(date,start){editingId=null;slotPreset={date,start};$('#modalTitle').textContent='Nouveau job';renderForm('#modalForm');setTimeout(()=>{if(date)$('#f_date').value=date;if(start!==undefined)$('#f_start').value=String(start).padStart(2,'0')+':00';$('#jobModal').classList.add('open')},0)}
function closeJobModal(){$('#jobModal').classList.remove('open')}
function saveForm(target){let name=$('#f_name').value.trim();if(!name)return toast('Nom obligatoire');let time=$('#f_start').value||'08:00';let start=Number(time.split(':')[0])+Number(time.split(':')[1]||0)/60;let job={id:editingId||Date.now().toString(),name,client:$('#f_client').value,place:$('#f_place').value,type:$('#f_type').value||'Autre',duration:Number($('#f_duration').value||1),date:$('#f_date').value,start,priority:$('#f_priority').value,maxWind:Number($('#f_wind').value||50),maxRain:Number($('#f_rain').value||5),minTemp:Number($('#f_tmin').value||-5),maxTemp:Number($('#f_tmax').value||35)};if(!job.date)job.date=ymd(selectedDate); if(editingId){jobs=jobs.map(j=>j.id===editingId?job:j)}else jobs.push(job); closeJobModal(); save(); toast(editingId?'Job modifié':'Job créé')}
function editJob(id){let j=jobs.find(x=>x.id===id);if(!j)return;editingId=id;$('#modalTitle').textContent='Modifier job';renderForm('#modalForm');setTimeout(()=>{$('#f_name').value=j.name;$('#f_client').value=j.client||'';$('#f_place').value=j.place||'';$('#f_type').value=j.type||'';$('#f_duration').value=j.duration||1;$('#f_date').value=(j.date||'').slice(0,10);let hh=Math.floor(j.start||8), mm=Math.round(((j.start||8)-hh)*60);$('#f_start').value=`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;$('#f_priority').value=j.priority||'moyenne';$('#f_wind').value=j.maxWind;$('#f_rain').value=j.maxRain;$('#f_tmin').value=j.minTemp;$('#f_tmax').value=j.maxTemp;$('#jobModal').classList.add('open')},0)}
function delJob(id){let j=jobs.find(x=>x.id===id);if(j&&confirm('Supprimer '+j.name+' ?')){jobs=jobs.filter(x=>x.id!==id);save();toast('Job supprimé')}}
function autoPlanAll(){let start=7;let date=ymd(selectedDate);jobs=jobs.map((j,i)=>({...j,date:j.date||date,start:j.start??(start+i*2)}));save();toast('Planning auto appliqué')}
function sliderWeather(){wx.wind=Number($('#sWind').value);wx.rain=Number($('#sRain').value);wx.temp=Number($('#sTemp').value);$('#modeLabel').textContent='Démo météo simulée';render()}
async function getRealWeather(){if(!navigator.geolocation)return toast('Géolocalisation non supportée');toast('Localisation…');navigator.geolocation.getCurrentPosition(async pos=>{try{let lat=pos.coords.latitude,lon=pos.coords.longitude;let url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,precipitation`;let r=await fetch(url);let d=await r.json();wx.temp=d.current.temperature_2m;wx.wind=d.current.wind_speed_10m;wx.rain=d.current.precipitation;$('#modeLabel').textContent='Météo réelle activée';render();toast('Météo réelle chargée')}catch(e){toast('Erreur météo')}},()=>toast('Permission localisation refusée'))}
setInterval(()=>$('#clock').textContent=new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'}),1000);$('#clock').textContent=new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});render();
</script>
</body>
